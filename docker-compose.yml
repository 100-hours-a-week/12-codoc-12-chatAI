version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: always
  qdrant:
    image: qdrant/qdrant
    container_name: qdrant_db
    ports:
      - "${QDRANT_PORT}:6333"  
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY}  
    volumes:
      # 호스트의 qdrant_storage 폴더를 컨테이너 내부 저장소와 연결
      - ./qdrant_storage:/qdrant/storage 
    restart: always

  api_server:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
      - redis
    env_file:
      - .env  