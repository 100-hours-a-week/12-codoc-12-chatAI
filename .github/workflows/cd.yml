name: ai-cd

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Trigger deploy via SSM
        run: |
          ARTIFACT_NAME="ai-source-${{ github.sha }}"
          CMD="bash /home/ubuntu/ai/deploy.sh ${{ secrets.GH_TOKEN }} ${{ github.repository }} ${{ github.run_id }} $ARTIFACT_NAME ${{ secrets.MODEL_API_KEY }}"

          # 1. 명령 전송
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.AI_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"$CMD\"]" \
            --region ${{ secrets.AWS_REGION }} \
            --query "Command.CommandId" --output text)

          echo "🚀 배포 명령 전송됨 (ID: $COMMAND_ID). 완료될 때까지 추적합니다..."

          # 2. 루프를 돌며 상태 추적 (wait의 타임아웃 제한을 우회)

          while true; do
            # 인스턴스 단위가 아니라 '명령 ID' 단위로 상태 확인 (더 안정적임)
            STATUS=$(aws ssm list-commands \
              --command-id "$COMMAND_ID" \
              --region ${{ secrets.AWS_REGION }} \
              --query "Commands[0].Status" --output text)
            
            echo "현재 배포 상태: $STATUS"

            if [[ "$STATUS" != "InProgress" && "$STATUS" != "Pending" ]]; then
              break
            fi
            sleep 15
          done

          # 3. [중요] 실행 로그(stdout/stderr) 강제 출력
          echo "=== 📋 EC2 배포 상세 로그 ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.AI_INSTANCE_ID }}" \
            --region ${{ secrets.AWS_REGION }} \
            --query "StandardErrorContent" --output text

          # 4. 상태가 Success가 아니면 워크플로우를 빨간색(실패)으로 종료
          if [ "$STATUS" != "Success" ]; then
            echo "❌ 배포 최종 실패 (상태: $STATUS)"
            exit 1
          fi
          echo "✅ 배포 최종 성공"
      - name: Notify Discord (always)
        if: always()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BRANCH="${{ github.ref_name }}"
          EVENT="${{ github.event_name }}"
          ACTOR="${{ github.actor }}"
          SHA="${{ github.sha }}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          if [ -z "$COMMIT_MSG" ]; then
            COMMIT_MSG="(커밋 메시지를 이벤트에서 가져올 수 없음)"
          fi

          # 역슬래시, 큰따옴표, 그리고 줄바꿈(\n)을 JSON 규격에 맞게 이스케이프 처리
          COMMIT_MSG_ESCAPED=$(printf '%s' "$COMMIT_MSG" | sed 's/\\/\\\\/g; s/\"/\\\"/g; :a;N;$!ba;s/\n/\\n/g')

          if [ "${{ job.status }}" = "success" ]; then
            STATUS="성공"
            COLOR="65280"
          else
            STATUS="실패"
            COLOR="16711680"
          fi

          curl -X POST -H "Content-Type: application/json" \
          -d "{
            \"embeds\": [{
              \"title\": \"[AI] CD 결과 알림\",
              \"description\": \"**상태**: ${STATUS}\\n**브랜치**: ${BRANCH}\\n**담당자**: ${ACTOR}\",
              \"color\": ${COLOR},
              \"fields\": [
                {\"name\": \"커밋 메시지\", \"value\": \"${COMMIT_MSG_ESCAPED}\"},
                {\"name\": \"로그\", \"value\": \"${RUN_URL}\"}
              ]
            }]
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}
