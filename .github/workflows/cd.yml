name: ai-cd

on:
  push:
    branches: [dev, main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ai-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy_dev:
    if: github.ref_name == 'dev'
    needs: [ci]
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION_DEV }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      ECR_REPO: ${{ secrets.ECR_REPO }}
      AI_INSTANCE_ID_DEV: ${{ secrets.AI_INSTANCE_ID_DEV }}
      AI_ENV_DEV: ${{ secrets.AI_ENV_DEV }}
      DEV_DEPLOY_SCRIPT_PATH: /home/ubuntu/codoc/scripts/deploy-chat-dev.sh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate dev deploy inputs
        run: |
          if [ -z "${AI_INSTANCE_ID_DEV}" ]; then
            echo "AI_INSTANCE_ID_DEV secret is empty"
            exit 1
          fi

          if [ -z "${AI_ENV_DEV}" ]; then
            echo "AI_ENV_DEV secret is empty"
            exit 1
          fi

      - name: Deploy to dev instance via SSM
        id: start_dev
        run: |
          APP_ENV_CONTENT_BASE64="$(printf '%s' "${AI_ENV_DEV}" | base64 -w0)"
          PARAMS_FILE="$(mktemp)"

          cat > "${PARAMS_FILE}" <<EOF
          {
            "commands": [
              "mkdir -p /home/ubuntu/codoc/logs",
              "export AWS_REGION='${AWS_REGION}'",
              "export ECR_REGISTRY='${ECR_REGISTRY}'",
              "export ECR_REPO='${ECR_REPO}'",
              "export IMAGE_TAG='dev'",
              "export CONTAINER_NAME='codoc-chat-ai'",
              "export HOST_PORT='8000'",
              "export APP_PORT='8000'",
              "export HEALTH_PATH='/'",
              "export APP_ENV_PATH='/home/ubuntu/app/.env'",
              "export APP_ENV_CONTENT_BASE64='${APP_ENV_CONTENT_BASE64}'",
              "nohup bash '${DEV_DEPLOY_SCRIPT_PATH}' > /home/ubuntu/codoc/logs/chat-dev-deploy.log 2>&1 < /dev/null &",
              "echo started"
            ]
          }
          EOF

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${AI_INSTANCE_ID_DEV}" \
            --document-name "AWS-RunShellScript" \
            --comment "Start chatAI dev deploy" \
            --parameters "file://${PARAMS_FILE}" \
            --query 'Command.CommandId' \
            --output text)

          echo "command_id=${COMMAND_ID}" >> "${GITHUB_OUTPUT}"
          echo "Started SSM command: ${COMMAND_ID}"

      - name: Wait for deploy start command
        run: |
          COMMAND_ID="${{ steps.start_dev.outputs.command_id }}"
          STATUS=""

          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${AI_INSTANCE_ID_DEV}" \
              --query 'Status' \
              --output text 2>/dev/null || true)

            echo "SSM command status: ${STATUS:-Pending} (${i}/120)"

            case "${STATUS}" in
              Success)
                break
                ;;
              Failed|Cancelled|TimedOut|Cancelling)
                break
                ;;
            esac

            sleep 5
          done

          if [ "${STATUS}" != "Success" ]; then
            echo "Final start-command status: ${STATUS:-Unknown}"
            aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${AI_INSTANCE_ID_DEV}" \
              --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
              --output json || true
            exit 1
          fi

          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${AI_INSTANCE_ID_DEV}" \
            --query '{Status:Status,Stdout:StandardOutputContent}' \
            --output json || true

      - name: Start health check via SSM
        id: health_check
        run: |
          PARAMS_FILE="$(mktemp)"

          cat > "${PARAMS_FILE}" <<'EOF'
          {
            "commands": [
              "for i in $(seq 1 60); do curl -fsS http://127.0.0.1:8000/ >/dev/null && echo healthy && exit 0; sleep 5; done",
              "docker logs --tail 200 codoc-chat-ai 2>&1 || true",
              "exit 1"
            ]
          }
          EOF

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${AI_INSTANCE_ID_DEV}" \
            --document-name "AWS-RunShellScript" \
            --comment "Health check chatAI dev" \
            --parameters "file://${PARAMS_FILE}" \
            --query 'Command.CommandId' \
            --output text)

          echo "command_id=${COMMAND_ID}" >> "${GITHUB_OUTPUT}"
          echo "Started health-check command: ${COMMAND_ID}"

      - name: Wait for health check
        run: |
          COMMAND_ID="${{ steps.health_check.outputs.command_id }}"
          STATUS=""

          for i in $(seq 1 120); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${AI_INSTANCE_ID_DEV}" \
              --query 'Status' \
              --output text 2>/dev/null || true)

            echo "Health-check status: ${STATUS:-Pending} (${i}/120)"

            case "${STATUS}" in
              Success)
                break
                ;;
              Failed|Cancelled|TimedOut|Cancelling)
                break
                ;;
            esac

            sleep 5
          done

          if [ "${STATUS}" != "Success" ]; then
            echo "Final health-check status: ${STATUS:-Unknown}"
            aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${AI_INSTANCE_ID_DEV}" \
              --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
              --output json || true
            exit 1
          fi

          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${AI_INSTANCE_ID_DEV}" \
            --query '{Status:Status,Stdout:StandardOutputContent}' \
            --output json || true

  deploy_main:
    if: github.ref_name == 'main'
    needs: [ci]
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      CODEDEPLOY_APP: ${{ secrets.CODEDEPLOY_APP }}
      CODEDEPLOY_GROUP: ${{ secrets.CODEDEPLOY_GROUP }}
      S3_BUCKET: ${{ secrets.DEPLOY_BUCKET }}
      S3_KEY: ${{ secrets.DEPLOY_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create CodeDeploy Deployment
        run: |
          aws deploy create-deployment \
            --application-name "$CODEDEPLOY_APP" \
            --deployment-group-name "$CODEDEPLOY_GROUP" \
            --revision "revisionType=S3,s3Location={bucket=${S3_BUCKET},key=${S3_KEY},bundleType=zip}"

      - name: Notify Discord
        if: always()
        run: |
          STATUS="${{ job.status == 'success' && '성공' || '실패' }}"
          COLOR="${{ job.status == 'success' && '65280' || '16711680' }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -X POST -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "AI CD 결과",
              "description": "상태: '"${STATUS}"'\n브랜치: ${{ github.ref_name }}\n담당자: ${{ github.actor }}",
              "color": '"${COLOR}"',
              "fields": [
                {"name": "커밋 메시지", "value": "${{ github.event.head_commit.message || 'Manual Trigger' }}"},
                {"name": "로그 확인", "value": "'"${RUN_URL}"'"}
              ]
            }]
          }' \
          ${{ secrets.DISCORD_WEBHOOK }}
