# .github/workflows/cd.yml
name: ai-cd

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      IS_PROD: ${{ github.ref_name == 'main' }}
      IS_DEV_BRANCH: ${{ (github.ref_name == 'dev' || github.ref_name == 'chore/migration') }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCESS_KEY_ID: ${{ (github.ref_name == 'dev' || github.ref_name == 'chore/migration') && secrets.AWS_ACCESS_KEY_ID_DEV || secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ (github.ref_name == 'dev' || github.ref_name == 'chore/migration') && secrets.AWS_SECRET_ACCESS_KEY_DEV || secrets.AWS_SECRET_ACCESS_KEY }}
      AI_INSTANCE_ID: ${{ (github.ref_name == 'dev' || github.ref_name == 'chore/migration') && secrets.AI_INSTANCE_ID_DEV || secrets.AI_INSTANCE_ID }}
      AI_ENV: ${{ (github.ref_name == 'dev' || github.ref_name == 'chore/migration') && secrets.AI_ENV_DEV || secrets.AI_ENV }}

    steps:
      # 1) AWS 인증
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 2) SSM 배포 실행 (.env 생성 + deploy.sh 실행)
      - name: Trigger deploy via SSM (create env + run deploy)
        run: |
          set -e

          ARTIFACT_NAME="ai-source-${{ github.sha }}"
          ENV_PATH="/home/ubuntu/ai/shared/.env"

          COMMAND_ID=$(
            aws ssm send-command \
              --instance-ids "${{ env.AI_INSTANCE_ID }}" \
              --document-name "AWS-RunShellScript" \
              --region "${{ env.AWS_REGION }}" \
              --parameters commands="[
                \"set -e\",
                \"mkdir -p /home/ubuntu/ai/shared\",
                \"cat > ${ENV_PATH} << 'EOF'\",
                \"${{ env.AI_ENV }}\",
                \"EOF\",
                \"chmod 600 ${ENV_PATH}\",
                \"chown ubuntu:ubuntu ${ENV_PATH}\",
                \"bash /home/ubuntu/ai/deploy.sh '${{ secrets.GH_TOKEN }}' '${{ github.repository }}' '${{ github.run_id }}' '${ARTIFACT_NAME}' '${ENV_PATH}'\"
              ]" \
              --query "Command.CommandId" --output text
          )

          echo "🚀 배포 명령 전송됨 (ID: $COMMAND_ID)"

          # 상태 추적 루프
          while true; do
            STATUS=$(aws ssm list-commands \
              --command-id "$COMMAND_ID" \
              --region "${{ env.AWS_REGION }}" \
              --query "Commands[0].Status" --output text)

            echo "현재 배포 상태: $STATUS"

            if [[ "$STATUS" != "InProgress" && "$STATUS" != "Pending" ]]; then
              break
            fi

            sleep 10
          done

          # stdout 출력
          echo "=== ✅ stdout (정상 로그) ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.AI_INSTANCE_ID }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "StandardOutputContent" --output text

          # stderr 출력
          echo "=== ❌ stderr (에러 로그) ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.AI_INSTANCE_ID }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "StandardErrorContent" --output text

          # 실패 시 워크플로우 실패 처리
          if [ "$STATUS" != "Success" ]; then
            echo "❌ 배포 최종 실패"
            exit 1
          fi

          echo "✅ 배포 최종 성공"

      # 3) Discord 알림 (항상 실행)
      - name: Notify Discord (always)
        if: always()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BRANCH="${{ github.ref_name }}"
          EVENT="${{ github.event_name }}"
          ACTOR="${{ github.actor }}"
          SHA="${{ github.sha }}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          if [ -z "$COMMIT_MSG" ]; then
            COMMIT_MSG="(커밋 메시지를 이벤트에서 가져올 수 없음)"
          fi

          # JSON 안전 이스케이프 처리
          COMMIT_MSG_ESCAPED=$(printf '%s' "$COMMIT_MSG" | sed \
            's/\\/\\\\/g; s/\"/\\\"/g; :a;N;$!ba;s/\n/\\n/g')

          # 상태 분기
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="✅ 성공"
            COLOR="65280"
          else
            STATUS="❌ 실패"
            COLOR="16711680"
          fi

          # Discord Webhook 전송
          curl -X POST -H "Content-Type: application/json" \
          -d "{
            \"embeds\": [{
              \"title\": \"[AI] CD 배포 결과 알림\",
              \"description\": \"**상태**: ${STATUS}\\n**브랜치**: ${BRANCH}\\n**담당자**: ${ACTOR}\",
              \"color\": ${COLOR},
              \"fields\": [
                {\"name\": \"커밋 메시지\", \"value\": \"${COMMIT_MSG_ESCAPED}\"},
                {\"name\": \"배포 로그\", \"value\": \"${RUN_URL}\"}
              ]
            }]
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}
