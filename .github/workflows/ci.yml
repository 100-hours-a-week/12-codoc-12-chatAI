name: ai-ci

on:
  workflow_call: {}
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ai-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ github.ref_name == 'dev' && secrets.AWS_REGION_DEV || secrets.AWS_REGION }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      ECR_REPO: ${{ secrets.ECR_REPO }}
      IMAGE_TAG: ${{ github.sha }}
      ENV_TAG: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install ruff build

      # 의존성 감사(warn-only)
      - name: Dependency Audit
        run: |
          pip install pip-audit
          pip-audit -l || true

      - name: Configure AWS Credentials
        if: (github.event_name == 'workflow_dispatch') || ((github.event_name == 'push') && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main'))
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        if: (github.event_name == 'workflow_dispatch') || ((github.event_name == 'push') && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main'))
        uses: docker/setup-buildx-action@v3

      - name: Login to ECR
        if: (github.event_name == 'workflow_dispatch') || ((github.event_name == 'push') && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main'))
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Image
        if: (github.event_name == 'workflow_dispatch') || ((github.event_name == 'push') && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main'))
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ env.ENV_TAG }}
          cache-from: type=gha,scope=chat-ai-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=chat-ai-${{ github.ref_name }}

      - name: Notify Discord
        if: always()
        run: |
          STATUS="${{ job.status == 'success' && '성공' || '실패' }}"
          COLOR="${{ job.status == 'success' && '65280' || '16711680' }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -X POST -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "AI CI 결과",
              "description": "상태: '"${STATUS}"'\n브랜치: ${{ github.ref_name }}\n담당자: ${{ github.actor }}",
              "color": '"${COLOR}"',
              "fields": [
                {"name": "커밋 메시지", "value": "${{ github.event.head_commit.message || 'Manual Trigger' }}"},
                {"name": "로그 확인", "value": "'"${RUN_URL}"'"}
              ]
            }]
          }' \
          ${{ secrets.DISCORD_WEBHOOK }}
