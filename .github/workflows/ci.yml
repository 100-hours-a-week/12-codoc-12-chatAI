      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: ai-dist-${{ github.sha }}
      #     path: dist/*
      #     if-no-files-found: error
      #     retention-days: 7

      # 6. ى†Œىٹ¤ ى•„ي‹°يŒ©يٹ¸ ى—…ë،œë“œ
      - name: Upload source artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ai-source-${{ github.sha }}
          path: ./
          retention-days: 7

      - name: Notify Discord (always)
        if: always()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BRANCH="${{ github.ref_name }}"
          EVENT="${{ github.event_name }}"
          ACTOR="${{ github.actor }}"
          SHA="${{ github.sha }}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          if [ -z "$COMMIT_MSG" ]; then
            COMMIT_MSG="(ى»¤ë°‹ ë©”ى‹œى§€ë¥¼ ى‌´ë²¤يٹ¸ى—گى„œ ê°€ى ¸ىک¬ ىˆک ى—†ى‌Œ)"
          fi

          # ى—­ىٹ¬ë‍کى‹œ, يپ°ë”°ىک´ي‘œ, ê·¸ë¦¬ê³  ى¤„ë°”ê؟ˆ(\n)ى‌„ JSON ê·œê²©ى—گ ë§‍ê²Œ ى‌´ىٹ¤ى¼€ى‌´ي”„ ى²کë¦¬
          COMMIT_MSG_ESCAPED=$(printf '%s' "$COMMIT_MSG" | sed 's/\\/\\\\/g; s/\"/\\\"/g; :a;N;$!ba;s/\n/\\n/g')

          if [ "${{ job.status }}" = "success" ]; then
            STATUS="ى„±ê³µ"
            COLOR="65280"
          else
            STATUS="ى‹¤يŒ¨"
            COLOR="16711680"
          fi

          curl -X POST -H "Content-Type: application/json" \
          -d "{
            \"embeds\": [{
              \"title\": \"[AI] CI ê²°ê³¼ ى•Œë¦¼\",
              \"description\": \"**ىƒپيƒœ**: ${STATUS}\\n**ë¸Œë‍œى¹ک**: ${BRANCH}\\n**ë‹´ë‹¹ى‍گ**: ${ACTOR}\",
              \"color\": ${COLOR},
              \"fields\": [
                {\"name\": \"ى»¤ë°‹ ë©”ى‹œى§€\", \"value\": \"${COMMIT_MSG_ESCAPED}\"},
                {\"name\": \"ë،œê·¸\", \"value\": \"${RUN_URL}\"}
              ]
            }]
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}
