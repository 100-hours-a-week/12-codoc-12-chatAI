      #       pytest -q
      #     else
      #       echo "pytest not installed. Skipping tests."
      #     fi

      # ى‌کى،´ى„± ê°گى‚¬(warn-only)
      - name: Dependency Audit
        run: |
          pip install pip-audit
          pip-audit -l || true

