      # - name: Build
      #   if: github.event_name == 'push' && github.ref == 'refs/heads/chore/ci-cd'
      #   run: |
      #     python -m build
      #     ls -al dist

      # # ى•„ي‹°يŒ©يٹ¸ ى—…ë،œë“œ(mainë§Œ)
      # - name: Upload Artifact
