name: ai-ci

on:
  pull_request:
    branches: [develop, main, chore/ci-cd]
  push:
    branches: [chore/ci-cd]
  workflow_dispatch: {}
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ai-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      # 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 파이썬 설정
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      # 의존성 설치
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install ruff build

      # 린트
      - name: Lint
        run: ruff check .

      # 포맷 체크
      - name: Format Check
        run: ruff format --check .

      # 테스트
      - name: Tests
        run: |
          if python -c "import importlib.util; import sys; sys.exit(0 if importlib.util.find_spec('pytest') else 1)"; then
            pytest -q
          else
            echo "pytest not installed. Skipping tests."
          fi

      # 의존성 감사(warn-only)
      - name: Dependency Audit
        run: |
          pip install pip-audit
          pip-audit -l || true

      # 패키징(main만)
      - name: Build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          python -m build
          ls -al dist

      # 아티팩트 업로드(main만)
      - name: Upload Artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: ai-dist-${{ github.sha }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

      # 실패 알림(Discord)
      - name: Notify Failure
        if: failure()
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d "{\"content\":\"❌ **AI CI 실패**\\nRepo: ${{ github.repository }}\\nRef: ${{ github.ref }}\\nActor: ${{ github.actor }}\\nRun: ${{ github.run_id }}\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}

      # 성공 알림(Discord)
      - name: Notify Success
        if: success()
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d "{\"content\":\"✅ **AI CI 성공**\\nRepo: ${{ github.repository }}\\nRef: ${{ github.ref }}\\nActor: ${{ github.actor }}\\nRun: ${{ github.run_id }}\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}
