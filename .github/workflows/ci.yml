name: ai-ci

on:
  # pull_request:
  #   branches: [dev, main]
  # push:
  #   branches: [dev]
  workflow_dispatch: {}
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ai-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      # 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 파이썬 설정
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      # 의존성 설치
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install ruff build

      # # 린트
      # - name: Lint
      #   run: ruff check .

      # # 포맷 체크
      # - name: Format Check
      #   run: ruff format --check .

      # # 테스트
      # - name: Tests
      #   run: |
      #     if python -c "import importlib.util; import sys; sys.exit(0 if importlib.util.find_spec('pytest') else 1)"; then
      #       pytest -q
      #     else
      #       echo "pytest not installed. Skipping tests."
      #     fi

      # 의존성 감사(warn-only)
      - name: Dependency Audit
        run: |
          pip install pip-audit
          pip-audit -l || true

      # # 패키징(main만)
      # - name: Build
      #   if: github.event_name == 'push' && github.ref == 'refs/heads/chore/ci-cd'
      #   run: |
      #     python -m build
      #     ls -al dist

      # # 아티팩트 업로드(main만)
      # - name: Upload Artifact
      #   if: github.event_name == 'push' && github.ref == 'refs/heads/chore/ci-cd'
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: ai-dist-${{ github.sha }}
      #     path: dist/*
      #     if-no-files-found: error
      #     retention-days: 7

      # 6. 소스 아티팩트 업로드
      - name: Upload source artifact
        if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: ai-source-${{ github.sha }}
          path: ./
          retention-days: 7
      - name: Notify Discord
        if: always()
        run: |
          # push 이벤트 컨텍스트에 맞게 변수 수정
          STATUS="${{ job.status == 'success' && '성공' || '실패' }}"
          COLOR="${{ job.status == 'success' && '65280' || '16711680' }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -X POST -H "Content-Type: application/json" \
          -d '{
            "embeds": [{
              "title": "AI CI 결과 (AI)",
              "description": "상태: '"${STATUS}"'\n브랜치: ${{ github.ref_name }}\n담당자: ${{ github.actor }}",
              "color": '"${COLOR}"',
              "fields": [
                {"name": "커밋 메시지", "value": "${{ github.event.head_commit.message || 'Manual Trigger' }}"},
                {"name": "로그 확인", "value": "[Github Actions Log]('"${RUN_URL}"')"}
              ]
            }]
          }' \
          ${{ secrets.DISCORD_WEBHOOK }}
